# Una sola versión de Node: no mezclar "..." + nodejs_22 con el node por defecto del provider (causa colisión npx 18 vs 22).
[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
    "mkdir -p /etc/nginx/sites-enabled",
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan event:cache",
    "php artisan view:cache",
]

# Sin [start]: el comando de arranque lo defines en Railway por servicio (web vs worker).
