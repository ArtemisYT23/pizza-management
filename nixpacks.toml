# Una sola versión de Node: no mezclar "..." + nodejs_22 con el node por defecto del provider (causa colisión npx 18 vs 22).
[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan event:cache",
    "php artisan view:cache",
]

# CMD por defecto de la imagen: servidor PHP integrado (no nginx: evita /var/log/nginx en contenedores mínimos).
# En Railway, el servicio WEB puede sustituir esto en Settings → Deploy por migrate + optimize + este mismo serve.
# El WORKER debe usar solo: php artisan queue:work database --sleep=3 --tries=3
[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
