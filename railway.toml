# Configuración para Railway (https://docs.railway.com/reference/config-as-code)
# Ajusta variables en el panel: Settings → Variables (y conecta MySQL).

[build]
builder = "NIXPACKS"

[deploy]
# Migra, optimiza cachés de Laravel y sirve la app en el puerto que asigna Railway.
startCommand = "php artisan migrate --force && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/up"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
