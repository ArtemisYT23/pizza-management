# Railway: este archivo es común a todos los servicios del mismo repo.
# NO definas startCommand aquí si tienes web + worker: el panel lo sobrescribe mal o lo aplica a ambos.
#
# En cada servicio → Settings → Deploy → Custom Start Command:
#
# Servicio WEB (Laravel + HTTP):
#   php artisan migrate --force && php artisan optimize && php artisan serve --host=0.0.0.0 --port=$PORT
#
# Servicio WORKER (cola; mismo repo y mismas variables que la web):
#   php artisan queue:work database --sleep=3 --tries=3
#
# Healthcheck solo en el servicio web (Deploy → Healthcheck Path): /up

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
